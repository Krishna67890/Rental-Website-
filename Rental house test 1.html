<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rental Webpage</title>
    <link rel="shortcut icon" href="p.jpg" type="image/x-icon">
</head>
<style>
    #Nav{
        width: 100%;
        height: 160px;
    
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
       
    }
    .nav1{
        width: 100%;
        height: 50%;
        background-color: white;
        border-bottom: 0.5px solid rgba(117, 111, 111, 0.479);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 20px;
        box-sizing: border-box;
    }
    .nav2{
        width: 100%;
        height: 50%;
        background-color: white;
    }
    .logo{
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .logo h1{
        font-size: 18px;
        font-weight: 300;
        color: red;
    }
    .search{
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px; 
    }
    .search input{
        width: 250px;
        padding: 10px;
        font-size: border-box;
        border-radius: 30px;
        padding-left: 20px;
        border: 1px solid rgba(125, 122, 122, 0.416);
        font-size: 15px;
        color: black;
        outline: none;
    }
    .search button{
      padding: 10px;
      background-color: red;
      color: white;
      font-size: 16px;
      border-radius: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      border: none;
      transition: all 0.2s;
      cursor: pointer;

    }
    .search button:hover{
        border: 2px solid red;
        background: transparent;
        color: red;
    }
    .search .png{
      width: 20px;
      height: 20px;
      color: white;
    }
    .search button:hover .png{
        color: red;
    }






    .ham{
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 20px; 
    }
    #btn1{
        border: none;
        outline: none;
        background-color: white;
        font-size: 16px; 
        font-weight: 300;
        cursor: pointer;
        border-radius: 30px;
        padding: 10px 20px 10px 20px;
        box-sizing: border-box;
        transition: all 0.1s;
    }
    #btn1:hover{
        background-color: rgba(232, 230,230, 0.844);
    }
    #btn2{
        border: 1px solid rgba(97, 93, 0.844);
        outline: none;
        background-color: white;
        color: black;
        cursor: pointer;
        border-radius: 30px;
        padding: 10px 20px 10px 20px;
        box-sizing: border-box;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px; 
        transition: all 0.1s;
    }
    #png1{
      width: 18px;
      height: 18px;
      fill: rgba(92, 89, 89, 0.651);
    }
    #png2{
      width: 25px;
      height: 25px;
      fill: rgba(92, 89, 89, 0.651);
    }
    #btn2:hover{
        box-shadow: 2px 2px 10px black;
    }
    .hamburger{
    position: absolute;
    width: 220px;
    height: 230px;
    background-color: white;
    right: 3%;
    top: 45%;
    box-shadow: 2px 2px 10px rgb(80, 78, 78);
    border-radius: 30px;
    display: flex;
    align-items: start;
    justify-content: center;
    flex-direction: column;
    padding: 10px;
    box-sizing: border-box;
    }
    .ham1{
        padding: 10px;
        box-sizing: border-box;
        font-size: 16px;
        font-weight: 300;
        color: black;
        cursor: pointer;
        width: 100%;
        border-radius: 30px;
    }
    .ham1:hover{
        background-color: rgba(232, 230, 230, 0.844);
    }













    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
    }
    #Nav{
      position: fixed;
      top: 0;
      z-index: 10;
    }
</style>
<body>






    <div id="Nav">
      {visible?<div class="hamburger">
       <div class="ham1">LOGIN</div>
       <div class="ham1">SignUp</div>
       <div class="ham1">List Your Home</div>
       <div class="ham1">help center</div>
      </div><div></div>







    <div class="nav1">
       <div class="logo">
        <img src="p.jpg" alt="" width="50px">
        <h1>Private property Rental</h1>
       </div>
       <div class="search">
       <input type="text" placeholder="search destination" />
       <button>
        <img src="search-interface-symbol.png" alt="Search Icon" style="width: 20px; height: 20px;">
        Search
        </button>
    
    
    


       </div>
       <div class="ham">
        <button id="btn1">List Your Home</button>
        <button id="btn2" onClick="setvisible(prev=>!perv)">
            <img id="png1" src="hamburger.png" alt="Menu" style="width: 20px; height: 20px;">
            <img id="png2" src="user.png" alt="Menu" style="width: 20px; height: 20px;">
        </button>
       </div>
    </div>











    <div class="nav2"></div>
</div>
 <script>
//    let [Visible, setvisible] = usestate(false)


      function toggleNavVisibility() {
    
        const nav = document.getElementById("Nav");
    
        nav.classList.toggle("visible");
    }
</script> 
</body>
</html>
