<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rental Webpage</title>
    <link rel="shortcut icon" href="p.jpg" type="image/x-icon">
    <style>
    
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        }

        header {
            background-color: #4CAF50;
            color: white;
            text-align: center;
            padding: 1em;
        }

        main {
            margin: 20px;
        }

        #form-section,
        #display-section {
            margin-bottom: 30px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        form label {
            font-weight: bold;
        }

        form input,
        form button {
            padding: 10px;
            font-size: 16px;
        }

        form button {
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }

        form button:hover {
            background-color: #45a049;
        }

        #card-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            border: 1px solid #ddd;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            padding: 15px;
            text-align: center;
            background: #fff;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 400px;
        }

        .image-box {
            flex-grow: 1;
            display: flex;
            justify-content: start;
            align-items: center;
            height: 200px;
            overflow-x: scroll;
            gap: 10px;
        }

        .image-box img {
            width: 150px;
            height: 100%;
            object-fit: cover;
            border-radius: 5px;
            cursor: pointer;
        }

        @media screen and (max-width: 600px) {
            #card-container {
                grid-template-columns: repeat(1, 1fr);
            }

            .card {
                height: auto;
            }
        }
    </style>
</head>

<body>
    <header>
        <h1>Rent a House or Villa</h1>
    </header>
    <main>
        <section id="form-section">
            <h2>Add a House or Villa</h2>
            <form id="rental-form" enctype="multipart/form-data" action="// add your forms-pree API here//" method="POST">
                <label for="title">Title:</label>
                <input type="text" id="title" name="Title" required>
    
                <label for="description">Description:</label>
                <input id="description" name="Description" required>
    
                <label for="image1">Image 1:</label>
                <input type="file" id="image1" name="Image 1" accept="image/*" required>

                <label for="image2">Image 2:</label>
                <input type="file" id="image2" name="Image 2" accept="image/*" required>

                <label for="image3">Image 3:</label>
                <input type="file" id="image3" name="Image 3" accept="image/*" required>
    
                <label for="price">Price:</label>
                <input type="number" id="price" name="Price" required>
    
                <label for="place">Location:</label>
                <input type="text" id="place" name="Location" required>
    
                <label for="contact">Mobile Number:</label>
                <input type="text" id="contact" name="Contact" required>
    
                <label for="email">Email:</label>
                <input type="email" id="email" name="Email" required>
    
                <input type="hidden" name="_cc" value="recipient1@example.com,recipient2@example.com">
    
                <button type="submit">Submit</button>
            </form>
        </section>
        <section id="display-section">
            <h2>Available Rentals</h2>
            <div id="card-container"></div>
        </section>
    </main>

    <script>
       document.getElementById('rental-form').addEventListener('submit', function (event) {
    event.preventDefault();
    const form = event.target;
    const formData = new FormData(form);

    fetch(form.action, {
        method: 'POST',
        body: formData,
        headers: {
            'Accept': 'application/json'
        }
    }).then(response => {
        if (response.ok) {
            alert('Form successfully submitted! Emails sent.');
            form.reset();
        } else {
            response.json().then(data => {
                const errorMessage = data.error || 'Failed to send emails. Please check your form or try again later.';
                alert(errorMessage);
            });
        }
    }).catch(error => {
        alert('An error occurred. Please try again.');
        console.error(error);
    });
});

    </script>
</body>

</html>
