        <header>
            <h1>Rent a House or Villa</h1>
          </header>
          <main>
            <section id="form-section">
              <h2>Add a House or Villa</h2>
              <form id="rental-form">
                <label for="title">Title:</label>
                <input type="text" id="title" placeholder="Enter title" required>
        
                <label for="description">Description:</label>
                <input type="text" id="description" placeholder="Enter a description" required>
        
                <label for="image1">Image 1 URL:</label>
                <input type="url" id="image1" placeholder="Enter image 1 URL" required>
        
                <label for="image2">Image 2 URL:</label>
                <input type="url" id="image2" placeholder="Enter image 2 URL" required>
        
                <label for="image3">Image 3 URL:</label>
                <input type="url" id="image3" placeholder="Enter image 3 URL" required>
        
                <label for="price">Price:</label>
                <input type="number" id="price" placeholder="Enter price" required>
        
                <label for="place">Place:</label>
                <input type="text" id="place" placeholder="Enter place" required>
        
                <button type="submit">Add</button>
              </form>
            </section>
        
            <section id="display-section">
              <h2>Available Rentals</h2>
              <div id="card-container"></div>
            </section>
          </main>
          <footer>
            <ul>
              <li><a href="#form-section">Add Rental</a></li>
              <li><a href="#display-section">View Rentals</a></li>
              <li><a href="#contact">Contact Us</a></li>
            </ul>
          </footer>











        <script>
            let [Visible, setvisible] = usestate(false)





    document.getElementById('rental-form').addEventListener('submit', function (e) {
      e.preventDefault();

      const title = document.getElementById('title').value;
      const description = document.getElementById('description').value;
      const image1 = document.getElementById('image1').value;
      const image2 = document.getElementById('image2').value;
      const image3 = document.getElementById('image3').value;
      const price = document.getElementById('price').value;
      const place = document.getElementById('place').value;

      if (!title || !description || !image1 || !image2 || !image3 || !price || !place) {
        alert('Please fill all fields!');
        return;
      }

      addCard(title, description, image1, image2, image3, price, place);

      // Reset form
      document.getElementById('rental-form').reset();
    });

    function addCard(title, description, image1, image2, image3, price, place) {
      const cardContainer = document.getElementById('card-container');

      const card = document.createElement('div');
      card.className = 'card';

      card.innerHTML = `
        <h3>${title}</h3>
        <p>${description}</p>
        <img src="${image1}" alt="${title} Image 1">
        <img src="${image2}" alt="${title} Image 2">
        <img src="${image3}" alt="${title} Image 3">
        <p>Price: ₹${price}</p>
        <p>Place: ${place}</p>
      `;

      cardContainer.appendChild(card);
    }

        </script>
